nameOverride: user-api

replicaCount: 3

image:
  repository: ghcr.io/example/user-api
  tag: "1.4.2"
  pullPolicy: IfNotPresent

containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP

env:
  - name: APP_ENV
    value: production
  - name: LOG_LEVEL
    value: info

readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: null

