{{- if and .Values.ingress.enabled .Values.service.enabled (eq .Values.workload.type "Deployment") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "application-chart.fullname" . }}
  labels:
    {{- include "application-chart.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ include "application-chart.fullname" $ }}
                port:
                  {{- if kindIs "float64" .servicePort }}
                  number: {{ .servicePort | int }}
                  {{- else if kindIs "int" .servicePort }}
                  number: {{ .servicePort }}
                  {{- else }}
                  name: {{ default "http" .servicePort }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}

